kind = "web"
previewPath = "/"
title = "Proxi Marketplace"
version = "1.0.0"
id = "artifacts/proxi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24180

[services.development]
run = "pnpm --filter @workspace/proxi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proxi", "run", "build" ]
publicDir = "artifacts/proxi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24180"
BASE_PATH = "/"
